[package]
name = "netlimiter-core"
version = "0.1.0"
edition = "2021"

[dependencies]
windivert = "0.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_NetworkManagement_IpHelper",
    "Win32_Networking_WinSock",
    "Win32_System_Threading",
    "Win32_System_ProcessStatus",
    "Win32_Storage_FileSystem",
    "Win32_System_Pipes",
    "Win32_System_Console",
    "Win32_System_IO",
    "Win32_Security",
    "Win32_System_Services",
] }
parking_lot = "0.12"
crossbeam-channel = "0.5"
arc-swap = "1"
rustc-hash = "2"
log = "0.4"
env_logger = "0.11"

[build-dependencies]
winres = "0.1"

[profile.release]
lto = "thin"
codegen-units = 1
panic = "abort"
strip = true
